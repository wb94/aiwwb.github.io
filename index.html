<!DOCTYPE html>
<html lang="zh-CN">

        body {

            min-height: 100vh;
            display: flex;

            font-size: 14px;
            color: #00d4ff;
            margin-bottom: 30px;
            letter-spacing: 2px;

        .domain {
            font-size: clamp(48px, 10vw, 80px);
            font-weight: 700;
            margin-bottom: 20px;
            background: linear-gradient(135deg, #fff 0%, #00d4ff 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            letter-spacing: 4px;
        }

        .description {
            font-size: 18px;
            color: rgba(255, 255, 255, 0.7);
            margin-bottom: 50px;
            line-height: 1.8;

        .price-label {

            color: rgba(255, 255, 255, 0.5);

            font-size: 36px;
            font-weight: 600;
            color: #00d4ff;

            background: linear-gradient(135deg, #00d4ff 0%, #0099ff 100%);
            color: #fff;
            text-decoration: none;
            border-radius: 50px;
            font-size: 18px;
            font-weight: 600;
            transition: all 0.3s ease;
            box-shadow: 0 10px 30px rgba(0, 212, 255, 0.3);
        }

        .btn-buy:hover {
            transform: translateY(-3px);
            box-shadow: 0 15px 40px rgba(0, 212, 255, 0.4);
        }

        .features {
            display: flex;
            justify-content: center;
            gap: 40px;
            margin-top: 60px;
            flex-wrap: wrap;
        }

        .feature {
            text-align: center;
        }

        .feature-icon {
            font-size: 24px;
            margin-bottom: 10px;
        }

        .feature-text {
            font-size: 14px;
            color: rgba(255, 255, 255, 0.5);
        }

        .note {
            margin-top: 40px;

</html>
